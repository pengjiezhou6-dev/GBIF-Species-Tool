<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBIF 物种数据获取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn-download:hover {
            background: #388E3C;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .log-entry a {
            color: #4FC3F7;
            text-decoration: underline;
        }

        .log-entry a:hover {
            color: #81D4FA;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .result-table th,
        .result-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-table th {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .result-table tr:hover {
            background: #f5f5f5;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .download-section {
            text-align: center;
            padding: 20px;
            background: #f0f9ff;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid #4CAF50;
        }

        .download-section h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .template-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid #dee2e6;
        }

        .template-info h4 {
            color: #495057;
            margin-bottom: 10px;
        }

        .matching-result {
            margin-top: 10px;
        }

        .matching-item {
            display: flex;
            align-items: center;
            padding: 5px 10px;
            margin: 3px 0;
            background: #e8f5e9;
            border-radius: 4px;
            font-size: 13px;
        }

        .matching-item.unmatched {
            background: #fff3e0;
        }

        .matching-item .arrow {
            margin: 0 10px;
            color: #666;
        }

        .format-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .format-xlsx {
            background: #4CAF50;
            color: white;
        }

        .format-csv {
            background: #2196F3;
            color: white;
        }

        .format-json {
            background: #FF9800;
            color: white;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 GBIF 物种数据获取工具</h1>
            <p>快速获取全球生物多样性信息设施（GBIF）的物种分布数据</p>
        </div>

        <div class="card">
            <div class="card-title">📝 数据输入</div>

            <div class="form-group">
                <label for="speciesInput">物种学名/ID</label>
                <input type="text" id="speciesInput" class="form-control"
                       placeholder="例如：Ovis orientalis, 2441050, Panthera leo">
                <div class="hint">💡 提示：输入物种学名（如 Ovis orientalis）或 GBIF ID（如 2441050），支持逗号分隔多个</div>
            </div>

            <!-- 新增：GBIF 账号配置 -->
            <div class="form-group" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px;">
                <label style="color: #667eea; font-weight: bold;">
                    🔐 GBIF 账号配置（必需）
                </label>
                <div class="form-row" style="margin-top: 10px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="gbifUsername" style="font-size: 12px;">Username</label>
                        <input type="text" id="gbifUsername" class="form-control"
                               placeholder="GBIF 用户名">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="gbifPassword" style="font-size: 12px;">Password</label>
                        <input type="password" id="gbifPassword" class="form-control"
                               placeholder="GBIF 密码">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="gbifEmail" style="font-size: 12px;">Email</label>
                        <input type="email" id="gbifEmail" class="form-control"
                               placeholder="接收通知的邮箱">
                    </div>
                </div>
                <div class="hint" style="margin-top: 8px;">
                    💡 提示：GBIF 下载任务可能需要几分钟到几小时，任务完成后会发送邮件通知
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="yearStart">起始年份</label>
                    <input type="number" id="yearStart" class="form-control"
                           value="2010" min="1700" max="2030">
                </div>
                <div class="form-group">
                    <label for="yearEnd">结束年份</label>
                    <input type="number" id="yearEnd" class="form-control"
                           value="2024" min="1700" max="2030">
                </div>
                <div class="form-group">
                    <label for="hostClassDefault">host_class 默认值</label>
                    <select id="hostClassDefault" class="form-control">
                        <option value="">（自动判断）</option>
                        <option value="wild">wild（野生）</option>
                        <option value="dom">dom（家养/圈养）</option>
                    </select>
                    <div class="hint">无法判断时使用的默认值</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">⚙️ 输出模式</div>
            
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="outputMode" value="default" checked onchange="toggleTemplateUpload()">
                    <span>默认标准格式 (XLSX)</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="outputMode" value="template" onchange="toggleTemplateUpload()">
                    <span>使用自定义模板</span>
                </label>
            </div>

            <div class="form-group hidden" id="templateFileGroup">
                <label for="templateFile">上传模板文件（支持 XLSX、CSV、JSON）</label>
                <input type="file" id="templateFile" class="form-control" 
                       accept=".xlsx,.csv,.json" onchange="uploadTemplate(this)">
                <div class="hint">💡 上传模板后，系统会自动识别格式和列名，并智能匹配数据字段</div>
                
                <div id="templateInfo" class="template-info hidden">
                    <h4>📄 模板信息</h4>
                    <p id="templateFormat"></p>
                    <p id="templateColumns"></p>
                    <div id="matchingResult" class="matching-result"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🚀 操作</div>
            
            <button id="startBtn" class="btn btn-primary" onclick="startFetch()">
                开始获取数据
            </button>
            <button id="cancelBtn" class="btn btn-danger" onclick="cancelTask()" style="display: none; margin-left: 10px; background: #dc3545;">
                取消任务
            </button>
            <button id="historyBtn" class="btn btn-secondary" onclick="showDownloadHistory()" style="margin-left: 10px; background: #6c757d;">
                查看历史下载
            </button>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
            </div>

            <div id="messageArea"></div>
            
            <div id="downloadSection" class="download-section hidden">
                <h3>✅ 数据获取完成！</h3>
                <p id="downloadInfo"></p>
                <a id="downloadBtn" class="btn-download" href="#">📥 点击下载文件</a>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📊 检索结果</div>
            <div id="resultTableContainer"></div>
        </div>

        <div class="card">
            <div class="card-title">📋 运行日志</div>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let lastLogCount = 0;
        let downloadTriggered = false;
        let templateUploaded = false;

        function toggleTemplateUpload() {
            const outputMode = document.querySelector('input[name="outputMode"]:checked').value;
            const templateGroup = document.getElementById('templateFileGroup');
            
            if (outputMode === 'template') {
                templateGroup.classList.remove('hidden');
            } else {
                templateGroup.classList.add('hidden');
            }
        }

        async function uploadTemplate(input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('template', file);

            try {
                const response = await fetch('/api/parse-template', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    templateUploaded = true;
                    displayTemplateInfo(result);
                    showMessage('模板上传成功！列名已自动匹配。', 'success');
                } else {
                    showMessage(`模板解析失败：${result.message}`, 'error');
                }
            } catch (error) {
                showMessage(`上传失败：${error.message}`, 'error');
            }
        }

        function displayTemplateInfo(result) {
            const templateInfo = document.getElementById('templateInfo');
            const templateFormat = document.getElementById('templateFormat');
            const templateColumns = document.getElementById('templateColumns');
            const matchingResult = document.getElementById('matchingResult');

            const formatClass = `format-${result.format}`;
            templateFormat.innerHTML = `格式：<span class="format-badge ${formatClass}">${result.format.toUpperCase()}</span>`;
            templateColumns.innerHTML = `检测到 ${result.columns.length} 列：${result.columns.join(', ')}`;

            let matchingHtml = '<h5 style="margin: 10px 0 5px; color: #495057;">字段匹配结果：</h5>';
            
            for (const [col, field] of Object.entries(result.matching)) {
                matchingHtml += `<div class="matching-item">
                    <span>${col}</span>
                    <span class="arrow">→</span>
                    <span style="color: #2e7d32; font-weight: bold;">${field}</span>
                    <span style="color: #4CAF50; margin-left: auto;">✓</span>
                </div>`;
            }

            if (result.unmatched.length > 0) {
                matchingHtml += '<div style="margin-top: 10px; color: #e65100;">未匹配的列：</div>';
                for (const col of result.unmatched) {
                    matchingHtml += `<div class="matching-item unmatched">
                        <span>${col}</span>
                        <span style="color: #e65100; margin-left: auto;">（将留空）</span>
                    </div>`;
                }
            }

            matchingResult.innerHTML = matchingHtml;
            templateInfo.classList.remove('hidden');
        }

        function log(message) {
            const logContainer = document.getElementById('logContainer');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            const linkRegex = /(\/api\/download\/[^\s]+)/g;
            if (linkRegex.test(message)) {
                logEntry.innerHTML = message.replace(/(\/api\/download\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            } else {
                logEntry.textContent = message;
            }
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateProgress(percent) {
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = percent + '%';
            progressFill.textContent = Math.round(percent) + '%';
        }

        function showMessage(message, type) {
            const messageArea = document.getElementById('messageArea');
            messageArea.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        function clearResults() {
            document.getElementById('resultTableContainer').innerHTML = '';
            document.getElementById('logContainer').innerHTML = '';
            document.getElementById('messageArea').innerHTML = '';
            document.getElementById('downloadSection').classList.add('hidden');
            downloadTriggered = false;
        }

        function displayResults(speciesInfoList) {
            const container = document.getElementById('resultTableContainer');
            
            if (!speciesInfoList || speciesInfoList.length === 0) {
                container.innerHTML = '<p>暂无数据</p>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'result-table';
            
            const headers = ['ID', '学名', '标准名', '等级', '状态', '界', '门', '纲', '目', '科'];
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            headers.forEach(h => {
                const th = document.createElement('th');
                th.textContent = h;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            speciesInfoList.forEach(info => {
                const row = document.createElement('tr');
                const cells = [
                    info.key || '',
                    info.scientificName || '',
                    info.canonicalName || '',
                    info.rank || '',
                    info.status || '',
                    info.kingdom || '',
                    info.phylum || '',
                    info.class || '',
                    info.order || '',
                    info.family || ''
                ];
                cells.forEach(c => {
                    const td = document.createElement('td');
                    td.textContent = c;
                    row.appendChild(td);
                });
                tbody.appendChild(row);
            });
            table.appendChild(tbody);

            container.innerHTML = '';
            container.appendChild(table);
        }

        function showDownloadSection(filenames, downloadUrls) {
            const downloadSection = document.getElementById('downloadSection');
            const downloadInfo = document.getElementById('downloadInfo');
            const downloadBtn = document.getElementById('downloadBtn');
            
            if (filenames.length === 1) {
                downloadInfo.textContent = `文件名：${filenames[0]}`;
                downloadBtn.href = downloadUrls[0];
                downloadBtn.download = filenames[0];
                downloadBtn.style.display = 'inline-block';
            } else {
                let html = `共生成 ${filenames.length} 个文件：<br>`;
                html += `<a class="btn-download" href="/api/download-all" style="margin: 5px; background: #FF5722;">📦 一键下载全部 (ZIP)</a><br>`;
                html += `<details style="margin-top: 10px;"><summary style="cursor: pointer; color: #666;">点击展开分别下载</summary>`;
                html += `<div style="margin-top: 10px;">`;
                filenames.forEach((filename, index) => {
                    html += `<a class="btn-download" href="${downloadUrls[index]}" download="${filename}" style="margin: 3px; display: inline-block; font-size: 14px;">📥 ${filename}</a>`;
                });
                html += `</div></details>`;
                downloadInfo.innerHTML = html;
                downloadBtn.style.display = 'none';
            }
            downloadSection.classList.remove('hidden');
        }

        async function startFetch() {
            if (isRunning) {
                alert('任务正在运行，请稍候...');
                return;
            }

            const speciesInput = document.getElementById('speciesInput').value.trim();
            if (!speciesInput) {
                showMessage('请输入物种学名或 ID!', 'error');
                return;
            }

            // 获取 GBIF 凭据
            const gbifUsername = document.getElementById('gbifUsername').value.trim();
            const gbifPassword = document.getElementById('gbifPassword').value.trim();
            const gbifEmail = document.getElementById('gbifEmail').value.trim();

            if (!gbifUsername || !gbifPassword || !gbifEmail) {
                showMessage('请填写完整的 GBIF 账号信息（Username, Password, Email）!', 'error');
                return;
            }

            const yearStart = parseInt(document.getElementById('yearStart').value);
            const yearEnd = parseInt(document.getElementById('yearEnd').value);

            if (yearStart > yearEnd) {
                showMessage('起始年份不能大于结束年份!', 'error');
                return;
            }

            const outputMode = document.querySelector('input[name="outputMode"]:checked').value;

            if (outputMode === 'template' && !templateUploaded) {
                showMessage('请先上传模板文件!', 'error');
                return;
            }

            isRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '正在获取...';

            clearResults();
            document.getElementById('progressContainer').style.display = 'block';
            updateProgress(0);

            log('='.repeat(50));
            log('GBIF 物种数据获取工具 v3.0 - 异步下载模式');
            log('='.repeat(50));
            log(`输入列表：${speciesInput}`);
            log(`年份范围：${yearStart} - ${yearEnd}`);
            log(`输出模式：${outputMode === 'default' ? '默认标准格式 (XLSX)' : '使用自定义模板'}`);
            log(`GBIF 账号：${gbifUsername}`);
            log('='.repeat(50));

            const formData = new FormData();
            formData.append('species_input', speciesInput);
            formData.append('year_start', yearStart);
            formData.append('year_end', yearEnd);
            formData.append('output_mode', outputMode);
            formData.append('host_class_default', document.getElementById('hostClassDefault').value);
            // 新增凭据
            formData.append('gbif_username', gbifUsername);
            formData.append('gbif_password', gbifPassword);
            formData.append('gbif_email', gbifEmail);

            try {
                const response = await fetch('/api/fetch', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('任务已启动，请等待完成...', 'info');
                    if (result.species_info) {
                        displayResults(result.species_info);
                    }
                } else {
                    showMessage(`错误：${result.message}`, 'error');
                    log(`\n错误：${result.message}`);
                    isRunning = false;
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').textContent = '开始获取数据';
                }
            } catch (error) {
                showMessage(`请求失败：${error.message}`, 'error');
                log(`\n错误：${error.message}`);
                isRunning = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('startBtn').textContent = '开始获取数据';
            }
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const result = await response.json();
                
                const newLogs = result.logs.slice(lastLogCount);
                if (newLogs.length > 0) {
                    newLogs.forEach(logMsg => {
                        const logContainer = document.getElementById('logContainer');
                        const logEntry = document.createElement('div');
                        logEntry.className = 'log-entry';
                        
                        const linkRegex = /(\/api\/download\/[^\s]+)/g;
                        if (linkRegex.test(logMsg)) {
                            logEntry.innerHTML = logMsg.replace(/(\/api\/download\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                        } else {
                            logEntry.textContent = logMsg;
                        }
                        
                        logContainer.appendChild(logEntry);
                    });
                    lastLogCount = result.logs.length;
                    document.getElementById('logContainer').scrollTop = document.getElementById('logContainer').scrollHeight;
                }
                
                if (result.progress !== undefined) {
                    updateProgress(result.progress);
                }
                
                if (result.species_info && result.species_info.length > 0) {
                    displayResults(result.species_info);
                }
                
                if (result.is_running) {
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('startBtn').textContent = '正在运行...';
                    document.getElementById('cancelBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').textContent = '开始获取数据';
                    document.getElementById('cancelBtn').style.display = 'none';
                    if (result.download_files && result.download_files.length > 0) {
                        showDownloadSection(result.download_files, result.download_urls);
                    }
                }
            } catch (error) {
                console.error('获取日志失败:', error);
            }
        }

        async function cancelTask() {
            if (!confirm('确定要取消当前任务吗？')) {
                return;
            }
            
            try {
                const response = await fetch('/api/cancel', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    showMessage('任务已取消', 'info');
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                showMessage(`取消失败：${error.message}`, 'error');
            }
        }

        async function showDownloadHistory() {
            const username = document.getElementById('gbifUsername').value.trim();
            const password = document.getElementById('gbifPassword').value.trim();
            
            if (!username || !password) {
                showMessage('请先填写 GBIF 账号信息', 'error');
                return;
            }
            
            showMessage('正在获取历史下载记录...', 'info');
            
            try {
                const response = await fetch(`/api/download-history?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                const result = await response.json();
                
                if (result.success) {
                    displayHistoryList(result.downloads);
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                showMessage(`获取历史失败：${error.message}`, 'error');
            }
        }

        function displayHistoryList(downloads) {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '';
            
            if (downloads.length === 0) {
                logContainer.innerHTML = '<div class="log-entry">暂无历史下载记录</div>';
                return;
            }
            
            const header = document.createElement('div');
            header.className = 'log-entry';
            header.style.fontWeight = 'bold';
            header.style.borderBottom = '1px solid #ccc';
            header.style.marginBottom = '10px';
            header.innerHTML = `找到 ${downloads.length} 条历史下载记录：`;
            logContainer.appendChild(header);
            
            downloads.forEach((d, index) => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                
                const statusColor = d.status === 'SUCCEEDED' ? '#28a745' : 
                                   d.status === 'RUNNING' ? '#ffc107' : '#dc3545';
                const statusText = d.status === 'SUCCEEDED' ? '✅ 成功' : 
                                  d.status === 'RUNNING' ? '⏳ 运行中' : '❌ 失败';
                
                let html = `<strong>${index + 1}.</strong> Key: <code>${d.key}</code> `;
                html += `<span style="color: ${statusColor}">${statusText}</span> `;
                html += `| 记录数: ${d.totalRecords || '-'} `;
                html += `| 创建: ${new Date(d.created).toLocaleString()}`;
                
                if (d.status === 'SUCCEEDED' && d.downloadLink) {
                    html += `<br><a href="${d.downloadLink}" target="_blank" style="color: #667eea; margin-left: 20px;">📥 下载 ZIP</a>`;
                }
                
                entry.innerHTML = html;
                logContainer.appendChild(entry);
            });
            
            logContainer.scrollTop = 0;
        }

        setInterval(fetchLogs, 2000);
    </script>
</body>
</html>
